{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
        }
        .otp-box{
            background:white;
            padding:30px;
            border-radius:14px;
            box-shadow:0 4px 14px rgba(0,0,0,0.08);
            width:100%;
            max-width:420px;
        }
        h2{
            margin-bottom:10px;
        }
        p{
            color:#555;
            margin-bottom:20px;
        }
        input{
            width:100%;
            padding:12px;
            font-size:16px;
            border:1px solid #ccc;
            border-radius:8px;
            margin-bottom:16px;
        }
        button{
            width:100%;
            background:#e53935;
            color:white;
            border:none;
            padding:12px;
            font-size:16px;
            border-radius:8px;
            cursor:pointer;
        }
    </style>
</head>
<body>
    <div class="otp-box">
        <h2>Email OTP Verification</h2>
        <p>Enter the 6-digit OTP sent to your email.</p>

        <form method="POST">
            {% csrf_token %}
            <input type="text" name="otp" placeholder="Enter OTP" maxlength="6" required>
            <button type="submit">Verify OTP</button>
        </form>
    </div>
</body>
</html>
