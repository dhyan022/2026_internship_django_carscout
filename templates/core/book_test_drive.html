{% extends 'base_dashboard.html' %}
{% load static %}

{% block content %}
<div class="container py-4">
    <div class="card shadow-sm p-4" style="max-width: 600px; margin: auto;">
        <h2 class="mb-3">Book Test Drive</h2>
        <p class="text-muted mb-4">
            Car: <strong>{{ car.title }}</strong>
        </p>

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label for="date" class="form-label">Select Date</label>
                <input
                    type="date"
                    id="date"
                    name="date"
                    class="form-control"
                    required
                >
            </div>

            <div class="mb-3">
                <label for="time" class="form-label">Select Time</label>
                <input
                    type="time"
                    id="time"
                    name="time"
                    class="form-control"
                    required
                >
            </div>

            <button type="submit" class="btn btn-danger">
                Confirm Booking
            </button>
        </form>
    </div>
</div>
{% endblock %}
